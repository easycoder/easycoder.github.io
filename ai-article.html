<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Building Applications with EasyCoder and Claude Code</title>
    <style>
        body {
            font-family: Georgia, 'Times New Roman', serif;
            line-height: 1.7;
            color: #333;
            margin: 0;
            padding: 0;
        }
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            color: #1a1a2e;
        }
        h1 { font-size: 2em; border-bottom: 3px solid #4a90d9; padding-bottom: 0.3em; }
        h2 { font-size: 1.5em; border-bottom: 1px solid #ccc; padding-bottom: 0.2em; margin-top: 2em; }
        h3 { font-size: 1.2em; color: #2c5f8a; }
        pre, code {
            font-family: 'Courier New', Courier, monospace;
            background: #f4f4f4;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        pre { padding: 1em; overflow-x: auto; line-height: 1.4; color: #333; }
        code { padding: 0.2em 0.4em; font-size: 0.9em; }
        pre code { padding: 0; border: none; background: none; }
        blockquote {
            border-left: 4px solid #4a90d9;
            margin: 1em 0;
            padding: 0.5em 1em;
            background: #f0f7ff;
            color: #444;
            font-style: italic;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            margin: 1em 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-size: 0.9em;
        }
        th, td { border: 1px solid #ddd; padding: 0.6em 1em; text-align: left; }
        th { background: #4a90d9; color: white; }
        tr:nth-child(even) { background: #f9f9f9; }
        a { color: #4a90d9; }
        img { max-width: 100%; border: 1px solid #ddd; border-radius: 4px; margin: 1em 0; }
        hr { border: none; border-top: 1px solid #ddd; margin: 2em 0; }
    </style>
    <script src="dist/easycoder.js"></script>
</head>
<body>
<pre id="easycoder-script" style="display:none">
    variable Script
    rest get Script from `/resources/ecs/ai-article.ecs?v=` cat now
    run Script
</pre>
</body>
</html>
