<!DOCTYPE html>
<html>
<head>
    <title>EasyCoder Server Test</title>
    <style>
        body { font-family: monospace; padding: 2em; max-width: 600px; }
        button { margin: 0.5em 0; padding: 0.4em 1em; cursor: pointer; }
        textarea { width: 100%; height: 80px; margin: 0.5em 0; }
        #output { background: #f4f4f4; border: 1px solid #ccc; padding: 1em; margin-top: 1em; white-space: pre; min-height: 3em; }
    </style>
</head>
<body>
    <h2>EasyCoder Server Test</h2>

    <button onclick="doGet('/hello')">GET /hello</button>
    <button onclick="doGet('/notapath')">GET /notapath (404)</button>
    <br>

    <label>POST body:</label><br>
    <textarea id="postBody">hello from browser</textarea>
    <button onclick="doPost()">POST /echo</button>

    <div id="output">Output will appear here...</div>

    <script>
        const out = document.getElementById('output');

        async function doGet(path) {
            out.textContent = `GET ${path} ...`;
            try {
                const r = await fetch('http://localhost:8765' + path);
                out.textContent = `Status: ${r.status}\n\n${await r.text()}`;
            } catch(e) {
                out.textContent = 'Error: ' + e.message;
            }
        }

        async function doPost() {
            const body = document.getElementById('postBody').value;
            out.textContent = 'POST /echo ...';
            try {
                const r = await fetch('http://localhost:8765/echo', {
                    method: 'POST',
                    body: body
                });
                out.textContent = `Status: ${r.status}\n\n${await r.text()}`;
            } catch(e) {
                out.textContent = 'Error: ' + e.message;
            }
        }
    </script>
</body>
</html>
