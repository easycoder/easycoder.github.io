<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doclets Web Reader (Dev)</title>
  <!-- Uncomment the following for development -->
    <script type='text/javascript' src='js/easycoder/Core.js'></script>
    <script type='text/javascript' src='js/easycoder/MarkdownRenderer.js'></script>
    <script type='text/javascript' src='js/easycoder/Webson.js'></script>
    <script type='text/javascript' src='js/easycoder/Browser.js'></script>
    <script type='text/javascript' src='js/easycoder/Compare.js'></script>
    <script type='text/javascript' src='js/easycoder/Compile.js'></script>
    <script type='text/javascript' src='js/easycoder/Condition.js'></script>
    <script type='text/javascript' src='js/easycoder/JSON.js'></script>
    <script type='text/javascript' src='js/easycoder/MQTT.js'></script>
    <script type='text/javascript' src='js/easycoder/REST.js'></script>
    <script type='text/javascript' src='js/easycoder/Run.js'></script>
    <script type='text/javascript' src='js/easycoder/Value.js'></script>
    <script type='text/javascript' src='js/easycoder/Main.js'></script>
    <script type='text/javascript' src='js/easycoder/EasyCoder.js'></script>
  <!-- Uncomment the the next line for deployment -->
  <!-- <script type='text/javascript' src='easycoder-min.js'></script> -->
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/mqtt/dist/mqtt.min.js"></script>
</head>
<body>
  <div id="App"></div>
  <pre id="easycoder-script" style="display:none">
!  Doclets web reader loader

        script Loader

        variable Script
        rest get Script from `aidev/project.ecs?v=` cat now
        run Script
  </pre>
  <script>
    // Load and render Webson layout
    fetch('aidev/project.json')
      .then(response => response.json())
      .then(layout => {
        if (window.Webson) {
          Webson.render(layout, document.getElementById('App'));
        }
      });
  </script>
</body>
</html>
